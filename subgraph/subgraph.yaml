specVersion: 1.3.0
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: MockZKPassportVerifier
    network: sepolia
    source:
      address: "0xcD59e6A78087BEA67a070b92bD7d8ff9d24a2647"
      abi: MockZKPassportVerifier
      startBlock: 10320000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Account
        - ProcessedTransaction
        - GlobalMetric
        - HourlyMetric
        - DailyMetric
        - VerificationEvent
        - RevocationEvent
      abis:
        - name: MockZKPassportVerifier
          file: ./abis/MockZKPassportVerifier.json
      eventHandlers:
        - event: AddressVerified(indexed address,uint256)
          handler: handleAddressVerified
          receipt: true
        - event: VerificationRevoked(indexed address,uint256)
          handler: handleVerificationRevoked
          receipt: true
      file: ./src/verifier.ts

  - kind: ethereum
    name: CLPc
    network: sepolia
    source:
      address: "0x889679fC04063Bd8706f5c2e5de26E3554FFFCa5"
      abi: CLPc
      startBlock: 10320000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - ProcessedTransaction
        - GlobalMetric
        - HourlyMetric
        - DailyMetric
        - TokenTransferEvent
        - TokenMintEvent
      abis:
        - name: CLPc
          file: ./abis/CLPc.json
      eventHandlers:
        - event: Transfer(indexed address,indexed address,uint256)
          handler: handleTransfer
          receipt: true
        - event: TokensMinted(indexed address,uint256,uint256,uint256)
          handler: handleTokensMinted
          receipt: true
      file: ./src/token.ts

  - kind: ethereum
    name: ClaimCLPc
    network: sepolia
    source:
      address: "0x2E4F7D60AA4416ead3610bD0f90c80277A8D95BD"
      abi: ClaimCLPc
      startBlock: 10320000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - Account
        - ProcessedTransaction
        - GlobalMetric
        - HourlyMetric
        - DailyMetric
        - ClaimEvent
      abis:
        - name: ClaimCLPc
          file: ./abis/ClaimCLPc.json
      eventHandlers:
        - event: Claimed(indexed address,uint256)
          handler: handleClaimed
          receipt: true
      file: ./src/claim.ts
